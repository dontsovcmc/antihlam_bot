name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          set -e

          if [ ! -d "${{ secrets.PROJECT_PATH }}" ]; then
            git clone git@github.com:${{ github.repository }}.git "${{ secrets.PROJECT_PATH }}"
          fi

          cd "${{ secrets.PROJECT_PATH }}"
          git pull origin master
          docker compose down
          docker compose build --no-cache
          docker compose up -d
